<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="thevibedude">
<defs>
  <clipPath id="hexClipFav">
    <polygon points="16,2 28,8.5 28,23.5 16,30 4,23.5 4,8.5" />
  </clipPath>
</defs>

<g transform="translate(16,16)">
  <!-- Hex fill -->
  <polygon
    points="0,-14 12.12,-7 12.12,7 0,14 -12.12,7 -12.12,-7"
    fill="#12080A"
  />

  <!-- Outer ring -->
  <polygon
    points="0,-14 12.12,-7 12.12,7 0,14 -12.12,7 -12.12,-7"
    fill="none"
    stroke="#D85A30"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Inner echo ring -->
  <polygon
    points="0,-12 10.39,-6 10.39,6 0,12 -10.39,6 -10.39,-6"
    fill="none"
    stroke="#F0997B"
    stroke-width="0.6"
    stroke-linejoin="round"
    opacity="0.4"
  />

  <!-- Binary texture -->
  <g opacity="0.13" clip-path="url(#hexClipFav)" transform="translate(-16,-16)">
    <text font-family="monospace" font-size="4" fill="#F0997B" x="4" y="11">10110</text>
    <text font-family="monospace" font-size="4" fill="#F0997B" x="3" y="17">01001</text>
    <text font-family="monospace" font-size="4" fill="#F0997B" x="5" y="23">11010</text>
    <text font-family="monospace" font-size="4" fill="#F0997B" x="3" y="29">01101</text>
  </g>

  <!-- Glitch slash -->
  <line
    x1="-9" y1="9"
    x2="10" y2="-9"
    stroke="#F0997B"
    stroke-width="1.2"
    stroke-linecap="round"
    opacity="0.45"
    transform="translate(2,2)"
  />

  <!-- Main slash -->
  <line
    x1="-9" y1="9"
    x2="10" y2="-9"
    stroke="#E8693A"
    stroke-width="2.8"
    stroke-linecap="round"
  />

  <!-- Fragment 1 -->
  <line
    x1="-9" y1="5"
    x2="-5" y2="9"
    stroke="#F5C4B3"
    stroke-width="1"
    stroke-linecap="round"
    opacity="0.57"
  />

  <!-- Fragment 2 -->
  <line
    x1="5" y1="-7"
    x2="9" y2="-4"
    stroke="#D85A30"
    stroke-width="0.9"
    stroke-linecap="round"
    opacity="0.6"
  />
</g>
</svg>
