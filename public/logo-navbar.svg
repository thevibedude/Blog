<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 44" width="220" height="44" role="img" aria-label="thevibedude">
<defs>
  <clipPath id="hexClipNav">
    <polygon points="22,0 40.07,10.5 40.07,31.5 22,42 3.93,31.5 3.93,10.5" />
  </clipPath>
  <style>
    /* Idle pulse animation */
    #nav-outer-ring {
      animation: navRingPulse 3s ease-in-out infinite;
    }
    #nav-glitch-slash {
      animation: navGlitchFlicker 4s ease-in-out infinite;
    }
    #nav-frag1 {
      animation: navFragFlicker 4s ease-in-out 0s infinite;
    }
    #nav-frag2 {
      animation: navFragFlicker 4s ease-in-out 0.3s infinite;
    }
    #nav-binary {
      animation: navBinaryScroll 8s linear infinite;
    }

    @keyframes navRingPulse {
      0%, 100% { stroke-opacity: 1; }
      50% { stroke-opacity: 0.5; }
    }
    @keyframes navGlitchFlicker {
      0%, 87% { transform: translate(0,0); opacity: 0.45; }
      88% { transform: translate(-2px,1px); opacity: 0.8; }
      90% { transform: translate(3px,-1px); opacity: 0.2; }
      93% { transform: translate(-1px,2px); opacity: 0.6; }
      96%, 100% { transform: translate(0,0); opacity: 0.45; }
    }
    @keyframes navFragFlicker {
      0%, 89% { opacity: 0.57; }
      90% { opacity: 0; }
      93% { opacity: 0.57; }
      100% { opacity: 0.57; }
    }
    @keyframes navBinaryScroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(-20px); }
    }

    /* Hover */
    .nav-logo-group { cursor: pointer; }
    .nav-logo-group:hover #nav-outer-ring {
      stroke: #F0997B;
      stroke-width: 2.2;
      animation-play-state: paused;
    }
    .nav-logo-group:hover #nav-wordmark {
      fill: #E8693A;
      letter-spacing: 3px;
    }
    .nav-logo-group:hover #nav-glitch-slash {
      opacity: 0.8;
    }

    #nav-wordmark, #nav-underline-main, #nav-underline-short {
      transition: fill 0.4s, letter-spacing 0.4s;
    }
  </style>
</defs>

<g class="nav-logo-group">
  <!-- Hex icon: center (22, 22), radius ~18 -->
  <g transform="translate(22,22)">
    <!-- Hex fill -->
    <polygon
      points="0,-18 15.59,-9 15.59,9 0,18 -15.59,9 -15.59,-9"
      fill="#12080A"
    />

    <!-- Outer ring -->
    <polygon
      id="nav-outer-ring"
      points="0,-18 15.59,-9 15.59,9 0,18 -15.59,9 -15.59,-9"
      fill="none"
      stroke="#D85A30"
      stroke-width="1.8"
      stroke-linejoin="round"
    />

    <!-- Inner echo ring -->
    <polygon
      points="0,-16 13.86,-8 13.86,8 0,16 -13.86,8 -13.86,-8"
      fill="none"
      stroke="#F0997B"
      stroke-width="0.7"
      stroke-linejoin="round"
      opacity="0.4"
    />

    <!-- Binary texture clipped -->
    <g id="nav-binary" opacity="0.13" clip-path="url(#hexClipNav)" transform="translate(-22,-22)">
      <text font-family="monospace" font-size="5" fill="#F0997B" x="5" y="12">1011 0010</text>
      <text font-family="monospace" font-size="5" fill="#F0997B" x="3" y="19">0100 1101</text>
      <text font-family="monospace" font-size="5" fill="#F0997B" x="7" y="26">1101 0010</text>
      <text font-family="monospace" font-size="5" fill="#F0997B" x="4" y="33">0110 1001</text>
      <text font-family="monospace" font-size="5" fill="#F0997B" x="6" y="40">1011 0100</text>
      <text font-family="monospace" font-size="5" fill="#F0997B" x="3" y="47">0101 1001</text>
    </g>

    <!-- Glitch slash -->
    <line
      id="nav-glitch-slash"
      x1="-12" y1="12"
      x2="14" y2="-12"
      stroke="#F0997B"
      stroke-width="1.6"
      stroke-linecap="round"
      opacity="0.45"
      transform="translate(3,3)"
    />

    <!-- Main slash -->
    <line
      id="nav-main-slash"
      x1="-12" y1="12"
      x2="14" y2="-12"
      stroke="#E8693A"
      stroke-width="3.5"
      stroke-linecap="round"
    />

    <!-- Fragment 1 -->
    <line
      id="nav-frag1"
      x1="-12" y1="8"
      x2="-8" y2="13"
      stroke="#F5C4B3"
      stroke-width="1.2"
      stroke-linecap="round"
      opacity="0.57"
    />

    <!-- Fragment 2 -->
    <line
      id="nav-frag2"
      x1="8" y1="-10"
      x2="13" y2="-7"
      stroke="#D85A30"
      stroke-width="1"
      stroke-linecap="round"
      opacity="0.6"
    />
  </g>

  <!-- Wordmark -->
  <g transform="translate(48, 22)">
    <text
      id="nav-wordmark"
      font-family="system-ui, Arial, sans-serif"
      font-weight="400"
      font-size="16"
      fill="#F0997B"
      dominant-baseline="middle"
      x="0"
      y="-3"
      letter-spacing="2"
    >thevibedude</text>

    <rect
      id="nav-underline-main"
      x="0"
      y="6"
      width="148"
      height="2.5"
      fill="#E8693A"
    />

    <rect
      id="nav-underline-short"
      x="0"
      y="10.5"
      width="59"
      height="1"
      fill="#F0997B"
      opacity="0.5"
    />
  </g>
</g>
</svg>
